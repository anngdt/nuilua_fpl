<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Núi Lửa FPL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="content.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#38003c;--pink:#e90052;--cyan:#00ff85;--white:#fff;--light:#c9a8cc;--dark:#260029;--card:#4a1050;--card2:#3d0843;--border:rgba(255,255,255,0.08);--hover:rgba(255,255,255,0.05);--gold:#e8b84b;}
html,body{height:100%;background:var(--pp);color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}
.topbar{background:var(--dark);display:flex;align-items:center;padding:0 16px;height:46px;flex-shrink:0;gap:10px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);white-space:nowrap;}
.logo span{color:var(--white);}
.gw-pill{background:var(--pink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;padding:4px 13px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.tabs{display:flex;align-items:stretch;margin-left:auto;}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--light);padding:0 18px;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;height:46px;display:flex;align-items:center;}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab:hover:not(.active){color:var(--white);}
.panel{flex:1;display:none;overflow:hidden;}
.panel.active{display:flex;}
.pb{background:var(--card);border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.bl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--light);margin-bottom:7px;flex-shrink:0;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.sr:last-child{border-bottom:none;}
.sl{font-size:11px;color:var(--light);}
.sv{font-size:11px;font-weight:600;color:var(--white);}
.sv.c{color:var(--cyan);}
.sv.p{color:var(--pink);}
.sv.g{color:var(--gold);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}
.loading-wrap{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:var(--light);}
.spinner{width:28px;height:28px;border:3px solid rgba(0,255,133,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
[data-tip]{position:relative;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1a0020;color:var(--white);font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:30;pointer-events:none;border:1px solid var(--border);font-family:'Barlow',sans-serif;font-weight:400;letter-spacing:0;text-transform:none;}

/* MATCHDAY */
#panel-matchday{flex-direction:row;gap:8px;padding:8px 12px;}
.md-outer{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-width:0;flex:1;}
.md-outer.wide{flex:1.6;}
.news-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.news-item:last-child{border-bottom:none;}
.news-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.news-body{flex:1;min-width:0;}
.news-badge{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;}
.news-text{font-size:12px;line-height:1.45;color:var(--white);}
.news-author{font-size:10px;color:var(--light);margin-top:1px;}
.conf-safe{background:rgba(0,255,133,.12);color:#00e676;}
.conf-bold{background:rgba(233,0,82,.12);color:#ff4569;}
.conf-mad{background:rgba(232,184,75,.12);color:var(--gold);}
.bars-wrap{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;}
.bars{display:flex;align-items:flex-end;gap:4px;flex:1;min-height:0;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:2px;}
.bar-v{font-size:9px;font-weight:600;color:var(--white);flex-shrink:0;}
.bar-b{width:100%;border-radius:3px 3px 0 0;min-height:2px;position:relative;}
.bar-chip-lbl{font-size:8px;font-weight:700;background:var(--pink);color:#fff;padding:1px 5px;border-radius:3px;white-space:nowrap;letter-spacing:.5px;margin-bottom:1px;flex-shrink:0;}
.bar-n{font-size:8px;color:var(--light);text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;flex-shrink:0;}
.avg-line{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(255,255,255,.45);pointer-events:none;z-index:2;}
.avg-lbl{font-size:8px;color:rgba(255,255,255,.65);background:var(--card);padding:0 3px;position:absolute;top:-8px;left:3px;font-weight:600;white-space:nowrap;}
.motd-card{background:rgba(255,255,255,.05);border-radius:6px;padding:7px 10px;flex:1;display:flex;flex-direction:column;justify-content:center;}
.motd-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);}
.motd-sub{font-size:9px;color:var(--light);margin-bottom:5px;}
.motd-row{display:flex;align-items:center;justify-content:space-between;}
.motd-side{text-align:center;flex:1;}
.motd-name{font-size:11px;font-weight:600;}
.motd-pts{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1;}
.motd-pts.win{color:var(--cyan);}
.motd-pts.lose{color:var(--light);}
.motd-vs{font-size:10px;color:var(--light);font-weight:600;}
.otd-item{padding:5px 0;border-bottom:1px solid var(--border);flex:1;display:flex;flex-direction:column;justify-content:center;}
.otd-item:last-child{border-bottom:none;}
.otd-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--pink);margin-bottom:2px;}
.otd-text{font-size:12px;line-height:1.4;color:var(--white);}

/* CAMPAIGN */
#panel-campaign{flex-direction:column;}
.camp-landing{display:flex;align-items:center;justify-content:center;gap:32px;flex:1;padding:20px;}
.camp-choice{cursor:pointer;text-align:center;border:2px solid transparent;transition:all .2s;border-radius:12px;padding:16px;background:rgba(255,255,255,.04);}
.camp-choice:hover{border-color:var(--cyan);transform:translateY(-3px);}
.camp-badge{width:160px;height:160px;object-fit:contain;display:block;margin:0 auto 12px;}
.camp-choice-sub{font-size:11px;color:var(--light);}
.camp-subnav{background:var(--card2);display:flex;align-items:center;padding:0 14px;height:36px;flex-shrink:0;gap:4px;border-bottom:1px solid var(--border);}
.back-btn{font-size:11px;color:var(--light);cursor:pointer;padding:3px 8px;border-radius:4px;transition:all .15s;border:none;background:transparent;}
.back-btn:hover{color:var(--white);background:rgba(255,255,255,.06);}
.snav-div{width:1px;height:18px;background:var(--border);}
.subtab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--light);padding:0 12px;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;height:36px;}
.subtab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.subtab:hover:not(.active){color:var(--white);}
.camp-content{flex:1;display:none;overflow:hidden;}
.camp-content.active{display:flex;gap:8px;padding:8px 12px;}
.ft{width:100%;border-collapse:collapse;font-size:12px;}
.ft thead th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--light);padding:5px 7px;text-align:left;border-bottom:1px solid rgba(255,255,255,.12);white-space:nowrap;user-select:none;cursor:pointer;}
.ft thead th.r{text-align:right;}
.ft thead th.sort-asc::after{content:" \25B2";color:var(--cyan);font-size:8px;}
.ft thead th.sort-desc::after{content:" \25BC";color:var(--cyan);font-size:8px;}
.ft tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.ft tbody tr:last-child{border-bottom:none;}
.ft tbody tr:hover{background:var(--hover);}
.ft td{padding:5px 7px;vertical-align:middle;color:var(--white);}
.ft td.r{text-align:right;}
.rk{font-size:11px;color:var(--light);font-weight:600;}
.mv-up{color:var(--cyan);font-size:10px;margin-left:3px;}
.mv-dn{color:var(--pink);font-size:10px;margin-left:3px;}
.mv-eq{color:var(--light);font-size:10px;margin-left:3px;}
.mn{font-weight:600;font-size:12px;color:var(--white);}
.tn{font-size:10px;color:var(--light);}
.tp{font-weight:700;font-size:13px;color:var(--cyan);}
.chip-b{background:var(--pink);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;white-space:nowrap;letter-spacing:.5px;}
.expand-row{display:none;background:rgba(0,0,0,.25);}
.expand-row.open{display:table-row;}
.expand-inner{padding:10px 12px;display:flex;gap:20px;flex-wrap:wrap;}
.exp-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--light);margin-bottom:5px;}
.player-chips{display:flex;flex-wrap:wrap;gap:3px;}
.pc{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.08);color:var(--white);}
.pc.cap{background:rgba(0,255,133,.18);color:var(--cyan);font-weight:600;}
.pc.vc{background:rgba(232,184,75,.18);color:var(--gold);}
.pc.bench{opacity:.45;}
.tr-in{color:var(--cyan);}
.tr-out{color:var(--pink);}
.live-banner{display:flex;align-items:center;gap:8px;padding:4px 10px;background:rgba(233,0,82,.1);border-radius:6px;margin-bottom:6px;flex-shrink:0;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-txt{font-size:11px;color:var(--white);}
.plr-tag{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.06);margin:1px;}
.plr-tag.played{background:rgba(0,200,117,.12);color:var(--cyan);}
.plr-tag.cap-tag{background:rgba(0,255,133,.2);color:var(--cyan);font-weight:700;}
.plr-tag.vc-tag{background:rgba(232,184,75,.15);color:var(--gold);}
.plr-tag.bench{opacity:.5;}
.stats-note{font-size:10px;color:var(--light);padding:3px 0 5px;flex-shrink:0;display:flex;align-items:center;gap:6px;}
.mini-spinner{width:12px;height:12px;border:2px solid rgba(0,255,133,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.viz-tabs{display:flex;gap:4px;margin-bottom:8px;flex-shrink:0;}
.viz-tab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--light);cursor:pointer;transition:all .15s;}
.viz-tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}
.fd{width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.fd.w{background:var(--cyan);color:var(--dark);}
.fd.d{background:rgba(255,255,255,.2);color:var(--white);}
.fd.l{background:var(--pink);color:#fff;}
/* Fixtures - fixed-width name column */
.fix-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0;}
.fix-nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--light);cursor:pointer;transition:all .15s;}
.fix-nav-btn:hover:not(:disabled){color:var(--white);border-color:rgba(255,255,255,.3);}
.fix-nav-btn:disabled{opacity:.3;cursor:default;}
.fix-gw-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--white);}
.fix-table{width:100%;border-collapse:collapse;}
.fix-table td{padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:middle;}
.fix-table tr:last-child td{border-bottom:none;}
.fix-name-cell{width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fix-name{font-size:12px;font-weight:600;cursor:pointer;transition:color .15s;}
.fix-name:hover{color:var(--cyan);}
.fix-score-cell{width:64px;text-align:center;}
.fix-score{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;}
.fix-score .w{color:var(--cyan);}
.fix-score .sep{color:var(--light);}
.fix-form-cell{width:100px;}
.fix-form-block{display:flex;flex-direction:column;gap:1px;}
.fix-form-dots{display:flex;gap:2px;}
.fix-gw-nums{display:flex;gap:2px;}
.fix-gw-num{width:14px;text-align:center;font-size:7px;color:var(--light);}
.matrix-wrap{overflow:auto;flex:1;}
.mx{border-collapse:collapse;font-size:11px;}
.mx th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--light);padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;}
.mx th:first-child{text-align:left;}
.mx td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.mx td:first-child{text-align:left;font-weight:600;color:var(--white);}
.cell-g{background:rgba(0,255,133,.1);}
.cell-r{background:rgba(233,0,82,.1);}
.cell-y{background:rgba(232,184,75,.08);}
.cell-x{background:rgba(255,255,255,.02);}

/* TEAMS */
#panel-teams{flex-direction:column;}
.teams-landing{flex:1;overflow:hidden;padding:12px;}
.teams-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;height:100%;}
.team-card{background:var(--card);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:1px solid transparent;display:flex;flex-direction:row;gap:10px;align-items:center;}
.team-card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.tc-accent{position:absolute;top:0;left:0;right:0;height:3px;}
.tc-left{display:flex;flex-direction:column;flex:1;min-width:0;}
.tc-name{font-size:14px;font-weight:600;color:var(--white);}
.tc-team{font-size:10px;color:var(--light);margin-bottom:5px;}
.tc-pts{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--cyan);line-height:1;}
.tc-meta{font-size:10px;color:var(--light);margin-bottom:5px;}
.tc-form{display:flex;gap:3px;margin-bottom:6px;}
.tc-awards{display:flex;gap:4px;flex-wrap:wrap;}
.atag{font-size:9px;color:var(--white);background:rgba(255,255,255,.1);padding:2px 5px;border-radius:4px;white-space:nowrap;}
.tc-photo{width:72px;height:72px;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tc-sil{width:44px;height:44px;opacity:.22;}
.profile-wrap{flex:1;display:none;flex-direction:column;overflow:hidden;}
.profile-wrap.active{display:flex;}
.profile-subnav{background:var(--card2);display:flex;align-items:center;padding:0 14px;height:36px;flex-shrink:0;gap:4px;border-bottom:1px solid var(--border);}
.profile-content{flex:1;display:flex;gap:8px;padding:8px 12px;overflow:hidden;}
.prof-col{display:flex;flex-direction:column;gap:8px;overflow-y:auto;overflow-x:hidden;min-width:0;}
.prof-photo{width:80px;height:80px;border-radius:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prof-sil{width:52px;height:52px;opacity:.28;}
.prof-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;}
.rank-tag{font-size:10px;background:rgba(255,255,255,.08);padding:2px 7px;border-radius:10px;color:var(--white);white-space:nowrap;}
.award-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);}
.award-row:last-child{border-bottom:none;}
.award-name{font-size:11px;color:var(--white);}
.award-count{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;}
.trophy-item{padding:3px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--light);}
.trophy-item:last-child{border-bottom:none;}
.rivalry-item{padding:4px 0;border-bottom:1px solid var(--border);}
.rivalry-item:last-child{border-bottom:none;}
.rivalry-name{font-size:11px;font-weight:600;color:var(--pink);}
.pitch-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px;}
.pitch{position:relative;background:linear-gradient(180deg,#1a6b30 0%,#1e7d36 50%,#1a6b30 100%);border-radius:6px;width:100%;max-width:300px;aspect-ratio:.65/1;margin:0 auto;overflow:hidden;}
.pitch-lines{position:absolute;inset:0;pointer-events:none;}
.pitch-row{position:absolute;left:0;right:0;display:flex;justify-content:space-around;align-items:center;}
.p-card{display:flex;flex-direction:column;align-items:center;gap:1px;}
.shirt-wrap{position:relative;width:30px;height:30px;}
.shirt-img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
.pts-badge{position:absolute;top:-6px;right:-7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:1px 3px;border-radius:6px;border:1px solid rgba(0,0,0,.3);white-space:nowrap;line-height:1.2;}
.pts-badge.played{background:#0d2b1a;color:var(--cyan);}
.pts-badge.pending{background:rgba(0,0,0,.45);color:var(--light);}
.name-tag{background:rgba(0,0,0,.65);color:var(--white);font-size:7px;font-weight:600;padding:1px 3px;border-radius:2px;white-space:nowrap;max-width:52px;overflow:hidden;text-overflow:ellipsis;text-align:center;}
.name-tag.cap-tag{background:rgba(0,255,133,.8);color:#000;}
.name-tag.vc-tag{background:rgba(232,184,75,.8);color:#000;}
.bench-strip{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:3px 0;background:rgba(0,0,0,.18);border-top:1px dashed rgba(255,255,255,.2);}
.spark-wrap{height:48px;display:flex;align-items:flex-end;gap:2px;margin-top:4px;}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;position:relative;cursor:pointer;}
.spark-bar:hover::after{content:attr(data-v);position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);background:#1a0020;color:var(--white);font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap;z-index:10;border:1px solid var(--border);}
.chart-tip{position:absolute;background:#1a0020;color:var(--white);font-size:10px;padding:5px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.18);pointer-events:none;display:none;z-index:20;white-space:nowrap;line-height:1.6;box-shadow:0 2px 8px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">N&uacute;i L&#7917;a <span>FPL</span></div>
    <div class="gw-pill" id="gw-label">GW &mdash;</div>
    <div class="tabs">
      <button class="tab active" onclick="showMain('matchday',this)">Matchday</button>
      <button class="tab" onclick="showMain('campaign',this)">Campaign</button>
      <button class="tab" onclick="showMain('teams',this)">Teams</button>
    </div>
  </div>
  <div id="panel-matchday" class="panel active"><div class="loading-wrap"><div class="spinner"></div><div>Loading&hellip;</div></div></div>
  <div id="panel-campaign" class="panel">
    <div id="camp-land" class="camp-landing">
      <div class="camp-choice" onclick="openLeague('classic')"><img src="classic-badge.jpg" class="camp-badge" alt="Classic"/><div class="camp-choice-sub">League table &amp; season stats</div></div>
      <div class="camp-choice" onclick="openLeague('premier')"><img src="premier-badge.jpg" class="camp-badge" alt="Premier"/><div class="camp-choice-sub">H2H fixtures, table &amp; matrix</div></div>
    </div>
    <div id="camp-classic" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="camp-subnav"><button class="back-btn" onclick="closeLeague()">&#8592; Back</button><div class="snav-div"></div><button class="subtab active" onclick="showSub('classic','ranking',this)">Live Ranking</button><button class="subtab" onclick="showSub('classic','stats',this)">Season Stats</button></div>
      <div id="classic-ranking" class="camp-content active"></div>
      <div id="classic-stats" class="camp-content"></div>
    </div>
    <div id="camp-premier" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="camp-subnav"><button class="back-btn" onclick="closeLeague()">&#8592; Back</button><div class="snav-div"></div><button class="subtab active" onclick="showSub('premier','fixtures',this)">Fixtures</button><button class="subtab" onclick="showSub('premier','table',this)">Table</button><button class="subtab" onclick="showSub('premier','matrix',this)">Matrix</button></div>
      <div id="premier-fixtures" class="camp-content active"></div>
      <div id="premier-table" class="camp-content"></div>
      <div id="premier-matrix" class="camp-content"></div>
    </div>
  </div>
  <div id="panel-teams" class="panel">
    <div class="teams-landing" id="teams-land"><div class="loading-wrap"><div class="spinner"></div><div>Loading&hellip;</div></div></div>
    <div class="profile-wrap" id="prof-wrap"></div>
  </div>
</div>
<script>
const CLASSIC_ID=37679,H2H_ID=294115;
const LS_KEY='nuilua_pos_v5';

// Chip name normaliser — always use these abbreviations
function chipAbbr(raw){
  if(!raw)return null;
  const s=raw.toUpperCase().replace(/[_\s]/g,'');
  if(s.includes('TRIPLE')||s==='3XCAPTAIN'||s==='TC')return'TC';
  if(s.includes('BENCH')||s==='BB')return'BB';
  if(s.includes('FREE')||s==='FH')return'FH';
  if(s.includes('WILD')||s==='WC')return'WC';
  return raw.slice(0,2).toUpperCase();
}

// Unique palette — suits dark purple background, each distinct
const REAL={
  // Manager colour assignments (specified by league):
  198683: {n:"An",    c:"#FFD700"}, // Yellow
  3973873:{n:"Hieu",  c:"#E53935"}, // Red
  888937: {n:"BachTr",  c:"#0D47A1"}, // Dark Blue
  1537418:{n:"Linh",  c:"#2E7D32"}, // Dark green
  7897954:{n:"BachNg", c:"#64B5F6"}, // Light blue
  848693: {n:"Khoi",  c:"#F06292"}, // Pink
  4979754:{n:"Trung", c:"#66BB6A"}, // Light green
  5221586:{n:"Ha",    c:"#9E9E9E"}, // Grey
  208451: {n:"Hai",   c:"#FB8C00"}, // Orange
  1727691:{n:"Hoang",    c:"#7B1FA2"}, // Purple
  5126841:{n:"Tung",  c:"#6D4C41"}, // Brown
  910084: {n:"Phu",   c:"#FFF59D"}, // Light yellow
};
const POS_NAME={1:'GK',2:'DEF',3:'MID',4:'FWD'};
let S={gw:null,gwAvg:null,lastFinishedGW:null,managers:[],h2hStandings:[],h2hMatches:[],elem:{},livePoints:{},teamMap:{},posStats:null,fixtureStatus:{}};

// ── HELPERS ──────────────────────────────────────────────────
async function api(p){try{const r=await fetch('/api/fpl?path='+encodeURIComponent(p));if(r.ok)return r.json();}catch{}const r2=await fetch('https://corsproxy.io/?url='+encodeURIComponent('https://fantasy.premierleague.com/api/'+p));if(!r2.ok)throw new Error('FPL '+r2.status);return r2.json();}
function showMain(id,el){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');el.classList.add('active');}
function openLeague(t){document.getElementById('camp-land').style.display='none';document.getElementById('camp-'+t).style.display='flex';if(t==='classic')buildClassicRanking();else buildPremierFixtures();}
function closeLeague(){['camp-classic','camp-premier'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('camp-land').style.display='flex';}
function showSub(lg,tab,el){document.querySelectorAll('#camp-'+lg+' .camp-content').forEach(p=>p.classList.remove('active'));document.querySelectorAll('#camp-'+lg+' .subtab').forEach(t=>t.classList.remove('active'));document.getElementById(lg+'-'+tab).classList.add('active');el.classList.add('active');if(lg==='classic'&&tab==='stats')buildClassicStats();if(lg==='premier'&&tab==='table')buildPremierTable();if(lg==='premier'&&tab==='matrix')buildPremierMatrix();}
function mvHtml(prev,cur){const d=(prev||cur)-cur;return d>0?'<span class="mv-up">&#9650;</span>':d<0?'<span class="mv-dn">&#9660;</span>':'<span class="mv-eq">&mdash;</span>';}
function shirtUrl(tc,gk){return'https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_'+tc+(gk?'_1':'')+'-66.png';}
function getColor(entryId){return REAL[entryId]?.c||CONTENT.managers.find(m=>m.entryId===entryId)?.color||'#888';}
function getName(entryId){return REAL[entryId]?.n||CONTENT.managers.find(m=>m.entryId===entryId)?.displayName||'?';}

// ── LOAD ALL ─────────────────────────────────────────────────
async function loadAll(){
  try{
    const boot=await api('bootstrap-static/');
    const gwObj=boot.events.find(e=>e.is_current)||boot.events.filter(e=>e.finished).pop();
    S.gw=gwObj?.id??CONTENT.currentGW;S.gwAvg=gwObj?.average_entry_score??null;
    document.getElementById('gw-label').textContent='GW '+S.gw;
    boot.elements.forEach(e=>{S.elem[e.id]={name:e.web_name,pos:e.element_type,team:e.team,tc:e.team_code};});
    boot.teams.forEach(t=>{S.teamMap[t.id]=t;});
    // Fixture status for current GW — used for accurate YTP calculation
    try{
      const fixes=await api('fixtures/?event='+S.gw);
      const teamFix={};
      fixes.forEach(f=>{
        [f.team_h,f.team_a].forEach(tid=>{
          if(!teamFix[tid])teamFix[tid]={started:false,finished:false,count:0,finCount:0};
          teamFix[tid].count++;
          if(f.started||f.finished_provisional||f.finished)teamFix[tid].started=true;
          if(f.finished||f.finished_provisional)teamFix[tid].finCount++;
        });
      });
      Object.keys(teamFix).forEach(tid=>{
        teamFix[tid].finished=(teamFix[tid].finCount>=teamFix[tid].count);
      });
      S.fixtureStatus=teamFix;
      const allDone=Object.values(teamFix).every(f=>f.finished);
      S.lastFinishedGW=allDone?S.gw:(S.gw>1?S.gw-1:S.gw);
    }catch{S.lastFinishedGW=S.gw>1?S.gw-1:S.gw;}
    try{const live=await api('event/'+S.gw+'/live/');live.elements.forEach(e=>{S.livePoints[e.id]={pts:e.stats.total_points,mins:e.stats.minutes};});}catch{}
    const classic=await api('leagues-classic/'+CLASSIC_ID+'/standings/');
    S.managers=await Promise.all(classic.standings.results.map(async(m)=>{
      const real=REAL[m.entry]||{},prof=CONTENT.managers.find(p=>p.entryId===m.entry)||{};
      let hist=null,picks=null,transfers=[];
      try{hist=await api('entry/'+m.entry+'/history/');}catch{}
      try{picks=await api('entry/'+m.entry+'/event/'+S.gw+'/picks/');}catch{}
      try{const tr=await api('entry/'+m.entry+'/transfers/');transfers=tr||[];}catch{}
      const gwH=hist?.current||[];
      const chipNow=chipAbbr((hist?.chips||[]).find(c=>c.event===S.gw)?.name);
      // All chips history: [{gw, abbr, pts}]
      const chipsHistory=(hist?.chips||[]).map(c=>({gw:c.event,abbr:chipAbbr(c.name),pts:gwH.find(g=>g.event===c.event)?.points||0}));
      const gwsPlayed=gwH.length||1;
      const totalPts=gwH.reduce((s,g)=>s+g.points,0);
      const avgGW=Math.round(totalPts/gwsPlayed);
      const bestGW=gwH.reduce((b,g)=>g.points>b?g.points:b,0);
      const worstGW=gwH.reduce((w,g)=>g.points<w?g.points:w,Infinity);
      const benchPts=gwH.reduce((s,g)=>s+(g.points_on_bench||0),0);
      const hits=gwH.reduce((s,g)=>s+(g.event_transfers_cost||0),0);
      const totalTr=gwH.reduce((s,g)=>s+(g.event_transfers||0),0);
      // Live GW
      let liveGW=0;
      if(picks?.picks)picks.picks.filter(p=>p.position<=11).forEach(p=>{const lp=S.livePoints[p.element];if(lp)liveGW+=lp.pts*(p.multiplier||1);});
      liveGW=liveGW||(gwH.find(g=>g.event===S.gw)?.points-((gwH.find(g=>g.event===S.gw)?.event_transfers_cost)||0)||(m.event_total||0));
      let ytp=0;
      if(picks?.picks){
        picks.picks.filter(p=>p.position<=11).forEach(p=>{
          const lp=S.livePoints[p.element];
          const el2=S.elem[p.element];
          const fix=el2?S.fixtureStatus[el2.team]:null;
          const played=lp&&lp.mins>0;
          const gameFinished=fix&&fix.finished;
          // Only count as YTP if hasn't played AND their game is not yet finished
          if(!played&&!gameFinished)ytp++;
        });
      }
      let capName='&mdash;';
      if(picks?.picks){const cap=picks.picks.find(p=>p.is_captain);if(cap&&S.elem[cap.element])capName=S.elem[cap.element].name;}
      const dn=real.n||prof.displayName||m.player_name.split(' ')[0];
      const color=real.c||prof.color||'#888';
      // GW-by-GW ranking history for chart (computed later after all loaded)
      return{entryId:m.entry,name:dn,fullName:m.player_name,team:prof.teamName||m.entry_name,pts:m.total,gw:liveGW,chip:chipNow,chipsHistory,form:[],formGWs:[],rank:m.rank,prev:m.last_rank||m.rank,color,initials:dn.slice(0,2).toUpperCase(),captain:capName,ytp,akaNames:prof.akaNames||[],trophies:prof.trophies||[],honors:prof.honors||[],awards:prof.awards||{kingOfGW:0,clownOfGW:0,goldenBench:0},stats:{bestGW,worstGW:worstGW===Infinity?0:worstGW,avgGW,benchPts,hits,totalTr,gwsPlayed,totalPts},gwHistory:gwH,chipsHistory,picks,transfers,rivalries:(CONTENT.rivalries||[]).filter(r=>r.teams.includes(dn))};
    }));

    // H2H
    try{const h=await api('leagues-h2h/'+H2H_ID+'/standings/');S.h2hStandings=h.standings?.results||[];}catch{}
    try{let pg=1,hn=true;S.h2hMatches=[];while(hn&&pg<=15){const mm=await api('leagues-h2h-matches/league/'+H2H_ID+'/?page='+pg);S.h2hMatches=S.h2hMatches.concat(mm.results||[]);hn=mm.has_next||false;pg++;}}catch{}

    // Compute H2H form per manager
    S.managers.forEach(m=>{
      const played=S.h2hMatches.filter(x=>(x.entry_1_entry===m.entryId||x.entry_2_entry===m.entryId)&&(x.entry_1_points||x.entry_2_points));
      const last5=played.slice(-5);
      m.form=last5.map(x=>{const mine=x.entry_1_entry===m.entryId?x.entry_1_points:x.entry_2_points,opp=x.entry_1_entry===m.entryId?x.entry_2_points:x.entry_1_points;return mine>opp?'w':mine<opp?'l':'d';});
      m.formGWs=last5.map(x=>x.event);
    });

    buildMatchday();buildTeamsLanding();
    setTimeout(()=>accumulatePositionalStats(),1500);
  }catch(err){document.getElementById('panel-matchday').innerHTML='<div class="loading-wrap" style="flex:1"><div style="background:rgba(233,0,82,.15);border:1px solid var(--pink);border-radius:8px;padding:16px;font-size:12px;max-width:380px;text-align:center"><strong>Could not load data</strong><br><br>'+err.message+'</div></div>';}
}

// ── POSITIONAL STATS ─────────────────────────────────────────
async function accumulatePositionalStats(){
  let stored={};try{stored=JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch{}
  if(!stored.managers)stored={gwsDone:[],managers:{}};
  const done=stored.gwsDone||[];
  const needed=[];for(let g=1;g<=S.gw;g++)if(!done.includes(g))needed.push(g);
  if(!needed.length){S.posStats=stored.managers;refreshIfOpen();return;}
  for(const gw of needed){
    let ld={};try{const live=await api('event/'+gw+'/live/');live.elements.forEach(e=>{ld[e.id]=e.stats.total_points||0;});}catch{}
    await Promise.all(S.managers.map(async m=>{
      if(!stored.managers[m.entryId])stored.managers[m.entryId]={GK:0,DEF:0,MID:0,FWD:0,Cap:0};
      try{
        const pk=await api('entry/'+m.entryId+'/event/'+gw+'/picks/');
        if(!pk?.picks)return;
        pk.picks.forEach(p=>{const el=S.elem[p.element];if(!el)return;const pts=ld[p.element]||0;const k=POS_NAME[el.pos];if(k)stored.managers[m.entryId][k]+=pts;if(p.is_captain)stored.managers[m.entryId].Cap+=pts*(p.multiplier-1);});
      }catch{}
    }));
    done.push(gw);stored.gwsDone=done;
    try{localStorage.setItem(LS_KEY,JSON.stringify(stored));}catch{}
  }
  S.posStats=stored.managers;refreshIfOpen();
}
function refreshIfOpen(){
  const e=document.getElementById('classic-stats');if(e&&e.dataset.built){e.dataset.built='';buildClassicStats();}
  // Refresh viz canvases if open
  if(window._activeVizRender)window._activeVizRender();
}

// ── MATCHDAY ─────────────────────────────────────────────────
function buildMatchday(){
  const mgrs=S.managers;
  const avg=S.gwAvg||Math.round(mgrs.reduce((s,m)=>s+m.gw,0)/mgrs.length);
  const maxPts=Math.max(...mgrs.map(m=>m.gw),1);
  function dotCol(t){return{quote:'#e8b84b',chip:'var(--pink)',captain:'var(--cyan)',transfer:'rgba(164,126,245,.9)',news:'var(--cyan)'}[t]||'var(--cyan)';}
  const news=(CONTENT.breakingNews||[]).map(n=>{
    const b=n.type==='quote'?'<span class="news-badge" style="background:rgba(232,184,75,.15);color:var(--gold)">'+(n.author||'Quote')+'</span>':'<span class="news-badge" style="background:rgba(255,255,255,.08);color:var(--light);text-transform:capitalize">'+n.type+'</span>';
    return'<div class="news-item"><div class="news-dot" style="background:'+dotCol(n.type)+'"></div><div class="news-body">'+b+'<div class="news-text">'+n.text+'</div>'+(n.author&&n.type!=='quote'?'<div class="news-author">&mdash; '+n.author+'</div>':'')+'</div></div>';
  }).join('')||'<div style="color:var(--light);font-size:12px">No news yet.</div>';
  const preds=(CONTENT.predictions||[]).map(p=>{
    const cls={safe:'conf-safe',bold:'conf-bold',mad:'conf-mad'}[p.confidence]||'conf-safe';
    const lbl={safe:'Safe',bold:'Bold',mad:'Mad Lad'}[p.confidence];
    const dot={safe:'var(--cyan)',bold:'var(--pink)',mad:'var(--gold)'}[p.confidence];
    return'<div class="news-item"><div class="news-dot" style="background:'+dot+'"></div><div class="news-body"><span class="news-badge '+cls+'">'+lbl+'</span><div class="news-text">'+p.text+'</div></div></div>';
  }).join('')||'<div style="color:var(--light);font-size:12px">No predictions.</div>';
  const motdCards=(CONTENT.matchesOfTheDay||[]).map(m=>{
    const ma=mgrs.find(x=>x.entryId===m.entryIdA)||{name:'?',gw:0};
    const mb=mgrs.find(x=>x.entryId===m.entryIdB)||{name:'?',gw:0};
    const aW=ma.gw>=mb.gw;
    return'<div class="motd-card"><div class="motd-title">'+m.title+'</div><div class="motd-sub">'+m.subtitle+'</div><div class="motd-row"><div class="motd-side"><div class="motd-name" style="color:'+(aW?'var(--cyan)':'var(--white)')+'">'+ma.name+'</div><div class="motd-pts '+(aW?'win':'lose')+'">'+ma.gw+'</div></div><div class="motd-vs">vs</div><div class="motd-side"><div class="motd-name" style="color:'+(!aW?'var(--cyan)':'var(--white)')+'">'+mb.name+'</div><div class="motd-pts '+(!aW?'win':'lose')+'">'+mb.gw+'</div></div></div></div>';
  });
  const lastItems=(CONTENT.lastGW?.items||[]).map(n=>'<div class="news-item"><div class="news-dot" style="background:'+dotCol(n.type)+'"></div><div class="news-body">'+(n.type==='quote'?'<span class="news-badge" style="background:rgba(232,184,75,.15);color:var(--gold)">'+(n.author||'Quote')+'</span>':'')+'<div class="news-text">'+n.text+'</div></div></div>').join('');
  
  // Replaced onThisDay with didYouKnow here
  const otdItems=(CONTENT.didYouKnow||[]).map(o=>'<div class="otd-item"><div class="otd-label">'+o.label+'</div><div class="otd-text">'+o.text+'</div></div>').join('');
  
  const el=document.getElementById('panel-matchday');
  el.innerHTML=
    '<div class="md-outer" style="padding:8px 0 8px 12px">'
      +'<div class="pb" style="flex:1;overflow-y:auto"><div class="bl">Breaking News &mdash; GW'+S.gw+'</div>'+news+'</div>'
      +'<div class="pb" style="flex:0 0 auto" id="pred-box"><div class="bl">Predictions</div>'+preds+'</div>'
    +'</div>'
    +'<div class="md-outer wide" style="padding:8px 0">'
      +'<div class="pb" style="flex:1"><div class="bl">GW'+S.gw+' Points Chart</div><div class="bars-wrap" id="bars-wrap"><div class="bars" id="bar-chart"></div></div></div>'
      +'<div class="pb" style="flex:0 0 auto" id="motd-box"><div class="bl">Matches of the Day</div><div style="display:flex;flex-direction:column;gap:6px">'+motdCards.join('')+'</div></div>'
    +'</div>'
    +'<div class="md-outer" style="padding:8px 12px 8px 0">'
      +'<div class="pb" style="flex:1;overflow-y:auto"><div class="bl">Last GW &mdash; GW'+(CONTENT.lastGW?.gw||S.gw-1)+'</div>'+(lastItems||'<div style="color:var(--light);font-size:12px">No recap yet.</div>')+'</div>'
      +'<div class="pb" style="flex:0 0 auto" id="otd-box"><div class="bl">Did You Know</div>'+otdItems+'</div>'
    +'</div>';

  // Bars (Updated to place chip above score above bar)
  const bEl=document.getElementById('bar-chart');
  mgrs.forEach(m=>{
    const h=Math.max(4,Math.round((m.gw/maxPts)*100));
    const c=document.createElement('div');c.className='bar-col';
    c.innerHTML=(m.chip?'<div class="bar-chip-lbl">'+m.chip+'</div>':'')
      +'<div class="bar-v">'+m.gw+'</div>'
      +'<div class="bar-b" style="height:'+h+'%;background:'+(m.gw===maxPts?'#00ff85':m.gw>=avg?'rgba(0,255,133,.5)':'rgba(233,0,82,.4)')+'"></div>'
      +'<div class="bar-n">'+m.name+'</div>';
    bEl.appendChild(c);
  });
  requestAnimationFrame(()=>{
    const wrap=document.getElementById('bars-wrap');if(!wrap)return;
    const bH=wrap.clientHeight-32;
    const line=document.createElement('div');line.className='avg-line';
    line.style.bottom=Math.round(Math.min(avg/maxPts,1)*bH+18)+'px';
    line.innerHTML='<span class="avg-lbl">avg '+avg+'</span>';
    wrap.appendChild(line);
    // Equalise bottom boxes height
    requestAnimationFrame(()=>{
      const pb=document.getElementById('pred-box'),mb=document.getElementById('motd-box'),ob=document.getElementById('otd-box');
      if(pb&&mb&&ob){const h=Math.max(pb.scrollHeight,mb.scrollHeight,ob.scrollHeight);[pb,mb,ob].forEach(e=>{e.style.height=h+'px';});}
    });
  });
}

// ── CLASSIC RANKING ──────────────────────────────────────────
function buildClassicRanking(){
  const el=document.getElementById('classic-ranking');if(el.dataset.built)return;el.dataset.built='1';
  const isLive=Object.keys(S.livePoints).length>0;
  let sk='total',sd=1; // sd=1=descending (highest first)
  function render(){
    const gwDone=(S.lastFinishedGW>=S.gw);
    const data=[...S.managers].map(m=>({...m,_liveTotal:gwDone?m.pts:(m.pts+m.gw)}));
    data.sort((a,b)=>sd*(sk==='gw'?b.gw-a.gw:b._liveTotal-a._liveTotal));
    const rows=data.map((m,i)=>{
      const ch=m.chip?'<span class="chip-b">'+m.chip+'</span>':'<span style="color:var(--light)">&mdash;</span>';
      const ytpHtml=m.ytp>0?'<span style="color:var(--gold);font-size:11px">'+m.ytp+'</span>':'<span style="color:var(--light);font-size:11px">0</span>';
      return'<tr style="cursor:pointer" onclick="toggleExp(\'re-'+m.entryId+'\')">'
        +'<td><span class="rk">'+(i+1)+'</span>'+mvHtml(m.prev,m.rank)+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:'+m.color+';display:inline-block;flex-shrink:0"></span><div><div class="mn">'+m.name+'</div><div class="tn">'+m.team+'</div></div></div></td>'
        +'<td style="font-size:11px;color:var(--light)">'+m.captain+'</td>'
        +'<td class="r">'+ytpHtml+'</td>'
        +'<td>'+ch+'</td>'
        +'<td class="r"><span style="color:'+(isLive?'var(--cyan)':'var(--light)')+'">'+m.gw+'</span></td>'
        +'<td class="r"><span class="tp">'+m._liveTotal+'</span></td>'
        +'</tr>'
        +'<tr class="expand-row" id="re-'+m.entryId+'"><td colspan="7"><div class="expand-inner">'+buildExpandRow(m)+'</div></td></tr>';
    }).join('');
    document.getElementById('rank-tbody').innerHTML=rows;
    ['gw','total'].forEach(k=>{const th=document.getElementById('rth-'+k);if(th)th.className='r'+(sk===k?(sd===1?' sort-desc':' sort-asc'):'');});
  }
  window.rankSort=function(k){sd=k===sk?-sd:1;sk=k;render();};
  el.innerHTML='<div class="pb" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">'
    +(isLive?'<div class="live-banner"><div class="live-dot"></div><div class="live-txt">Live points &mdash; refresh browser to update</div></div>':'')
    +'<div class="bl">Live Ranking &mdash; GW'+S.gw+'</div>'
    +'<div style="overflow-y:auto;flex:1"><table class="ft"><thead><tr>'
    +'<th style="width:50px" data-tip="Rank vs last GW">Rank</th>'
    +'<th data-tip="Manager and team">Team</th>'
    +'<th data-tip="Captain this GW">Captain</th>'
    +'<th class="r" id="rth-tp" data-tip="Starters yet to play">To Play</th>'
    +'<th data-tip="Chip used this GW">Chip</th>'

}
function toggleExp(id){document.getElementById(id)?.classList.toggle('open');}
function buildExpandRow(m){

  function pc(p,isB){const el=S.elem[p.element];const name=el?.name||'#'+p.element;const lp=S.livePoints[p.element];const pts=lp?lp.pts*(p.multiplier||1):0;const played=lp&&lp.mins>0;const cls='pc'+(p.is_captain?' cap':p.is_vice_captain?' vc':isB?' bench':'');return'<span class="'+cls+'">'+(p.is_captain?'(C) ':p.is_vice_captain?'(V) ':'')+name+(lp?' &middot; '+pts:'')+'</span>';}
  const sH=starters.length?'<div class="exp-label">Starting XI</div><div class="player-chips">'+starters.map(p=>pc(p,false)).join('')+'</div>':'<div style="font-size:11px;color:var(--light)">Lineup not available</div>';
  const bH=bench.length?'<div class="exp-label" style="margin-top:5px">Bench</div><div class="player-chips">'+bench.map(p=>pc(p,true)).join('')+'</div>':'';
  const gwTr=m.transfers.filter(t=>t.event===S.gw);
  const hit=m.picks?.entry_history?.event_transfers_cost||0;
  const tH=gwTr.length?'<div class="exp-label">Transfers'+(hit?'<span style="color:var(--pink);font-size:10px;font-weight:600"> &minus;'+hit+'</span>':'')+'</div>'+gwTr.map(t=>'<div style="font-size:11px;padding:1px 0"><span class="tr-in">\u2191'+(S.elem[t.element_in]?.name||'#'+t.element_in)+'</span> for <span class="tr-out">\u2193'+(S.elem[t.element_out]?.name||'#'+t.element_out)+'</span></div>').join(''):'';
  return'<div style="min-width:200px">'+sH+bH+'</div>'+(tH?'<div>'+tH+'</div>':'');
}

// ── CLASSIC STATS ────────────────────────────────────────────
function buildClassicStats(){
  const el=document.getElementById('classic-stats');if(el.dataset.built)return;el.dataset.built='1';
  const ps=S.posStats||{};
  const hasPos=Object.keys(ps).length>0;
  const cols=[
    {k:'name',  l:'Team',  r:false,tip:'Manager and team name',fn:m=>'<div class="mn">'+m.name+'</div><div class="tn">'+m.team+'</div>'},
    {k:'pts',   l:'Total', r:true, tip:'Total classic points',fn:m=>'<span class="tp">'+m.pts+'</span>'},
    {k:'best',  l:'Best',  r:true, tip:'Highest single GW score',fn:m=>'<span style="color:var(--cyan);font-weight:600">'+m.stats.bestGW+'</span>'},
    {k:'worst', l:'Worst', r:true, tip:'Lowest single GW score',fn:m=>'<span style="color:var(--pink);font-weight:600">'+m.stats.worstGW+'</span>'},
    {k:'avg',   l:'Avg',   r:true, tip:'Personal avg: total pts \u00f7 GWs played (not the FPL league avg)',fn:m=>''+m.stats.avgGW},
    {k:'cap',   l:'Capt',  r:true, tip:'Captaincy bonus pts (extra above 1\u00d7)',fn:m=>{const v=ps[m.entryId]?.Cap;return v!=null?'<span style="color:var(--gold);font-weight:600">'+v+'</span>':'<span style="color:var(--light)">--</span>';}},
    {k:'gk',    l:'GK',    r:true, tip:'Total GK pts',fn:m=>{const v=ps[m.entryId]?.GK;return v!=null?v:'<span style="color:var(--light)">--</span>';}},
    {k:'def',   l:'DEF',   r:true, tip:'Total DEF pts',fn:m=>{const v=ps[m.entryId]?.DEF;return v!=null?v:'<span style="color:var(--light)">--</span>';}},
    {k:'mid',   l:'MID',   r:true, tip:'Total MID pts',fn:m=>{const v=ps[m.entryId]?.MID;return v!=null?v:'<span style="color:var(--light)">--</span>';}},
    {k:'fwd',   l:'FWD',   r:true, tip:'Total FWD pts',fn:m=>{const v=ps[m.entryId]?.FWD;return v!=null?v:'<span style="color:var(--light)">--</span>';}},
    {k:'bench', l:'Bench', r:true, tip:'Total bench pts all season',fn:m=>m.stats.benchPts},
    {k:'tr',    l:'Trf',   r:true, tip:'Transfers made (chips excluded)',fn:m=>m.stats.totalTr},
    {k:'hits',  l:'Hits',  r:true, tip:'Pts deducted for extra transfers',fn:m=>'<span style="color:'+(m.stats.hits>0?'var(--pink)':'var(--light)')+'">'+(m.stats.hits>0?'&minus;'+m.stats.hits:'0')+'</span>'},
  ];
  const getV=(m,k)=>({name:m.name,pts:m.pts,best:m.stats.bestGW,worst:m.stats.worstGW,avg:m.stats.avgGW,cap:ps[m.entryId]?.Cap??-1,gk:ps[m.entryId]?.GK??-1,def:ps[m.entryId]?.DEF??-1,mid:ps[m.entryId]?.MID??-1,fwd:ps[m.entryId]?.FWD??-1,bench:m.stats.benchPts,tr:m.stats.totalTr,hits:m.stats.hits}[k]??0);
  let sk='pts',sd=1; // sd=1=descending
  function buildTable(){
    const sorted=[...S.managers].sort((a,b)=>{const av=getV(a,sk),bv=getV(b,sk);return typeof av==='string'?av.localeCompare(bv)*(-sd):(bv-av)*sd;});
    const thead=cols.map(c=>'<th class="'+(sk===c.k?(sd===1?'sort-desc':'sort-asc'):'')+' '+(c.r?'r':'')+'" data-tip="'+c.tip+'" onclick="statsSort(\''+c.k+'\')">'+c.l+'</th>').join('');
    const tbody=sorted.map(m=>'<tr>'+cols.map(c=>'<td class="'+(c.r?'r':'')+'">'+c.fn(m)+'</td>').join('')+'</tr>').join('');
    const tb=document.getElementById('stats-tbl');if(tb)tb.innerHTML='<thead><tr>'+thead+'</tr></thead><tbody>'+tbody+'</tbody>';
  }
  window.statsSort=k=>{sd=k===sk?-sd:-1;sk=k;buildTable();};

  // VIZ: 1=Rank Journey (classic), 2=Bench vs Hits scatter
  const VIZ=[{id:'rj',label:'Rank Journey'},{id:'scatter',label:'Position vs Hits'}];
  let activeViz=0;

  // Build GW-by-GW classic ranking history from gwHistory cumulative pts
  function buildClassicRankHistory(){
  const cutoff = S.lastFinishedGW || S.gw;

  // Build cumulative totals directly from FPL history
  const totalsByGW = {};

  S.managers.forEach(m => {
    totalsByGW[m.entryId] = {};

    m.gwHistory.forEach(g => {
      // total_points is the TRUE cumulative season total
      totalsByGW[m.entryId][g.event] = g.total_points || 0;
    });
  });

  const result = {};
  S.managers.forEach(m => {
    result[m.entryId] = [];
  });

  for(let gw = 1; gw <= cutoff; gw++){
    const ranked = S.managers.map(m => ({
      eid: m.entryId,
      pts: totalsByGW[m.entryId][gw] || 0
    }));

    ranked.sort((a,b) => b.pts - a.pts);

    ranked.forEach((r, idx) => {
      result[r.eid].push({
        gw,
        rank: idx + 1
      });
    });
  }

  return result;
}

  function drawRankJourney(ctx,W,H){
    const PAD={l:28,r:20,t:14,b:48};
    const gw=W-PAD.l-PAD.r,gh=H-PAD.t-PAD.b;
    const n=S.managers.length;
    const maxGW=S.gw;
    const hist=buildClassicRankHistory();
    // Grid
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
    for(let i=1;i<=n;i++){const y=PAD.t+gh*(i-1)/(n-1);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gw,y);ctx.stroke();ctx.fillStyle='rgba(201,168,204,.6)';ctx.font='9px Barlow';ctx.textAlign='right';ctx.fillText(i,PAD.l-3,y+3);}
    // X axis labels (every 4 GWs)
    for(let g=1;g<=maxGW;g+=4){const x=PAD.l+gw*(g-1)/(maxGW-1||1);ctx.fillStyle='rgba(201,168,204,.5)';ctx.font='8px Barlow';ctx.textAlign='center';ctx.fillText(g,x,H-4);}
    // Lines + dots
    S.managers.forEach(m=>{
      const data=hist[m.entryId]||[];if(!data.length)return;
      ctx.beginPath();ctx.strokeStyle=m.color+'cc';ctx.lineWidth=1.5;
      data.forEach((d,i)=>{const x=PAD.l+gw*(d.gw-1)/(maxGW-1||1);const y=PAD.t+gh*(d.rank-1)/(n-1);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();
      // Latest dot + label
      const last=data[data.length-1];
      const lx=PAD.l+gw*(last.gw-1)/(maxGW-1||1),ly=PAD.t+gh*(last.rank-1)/(n-1);
      ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=m.color;ctx.fill();
      // All dots
      data.forEach(d=>{const x=PAD.l+gw*(d.gw-1)/(maxGW-1||1);const y=PAD.t+gh*(d.rank-1)/(n-1);ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle=m.color+'99';ctx.fill();});
      ctx.fillStyle=m.color;ctx.font='bold 9px Barlow';ctx.textAlign='left';ctx.fillText(m.name,lx+5,ly+3);
    });
    ctx.fillStyle='rgba(201,168,204,.5)';ctx.font='9px Barlow';ctx.textAlign='center';ctx.fillText('Gameweek',PAD.l+gw/2,H-4);
  }

  function drawScatter(ctx,W,H){
    // Position vs Hits — does taking more hits lead to better rank?
    const PAD={l:58,r:72,t:20,b:58};const gw=W-PAD.l-PAD.r,gh=H-PAD.t-PAD.b;
    const n=S.managers.length;
    // X = hits taken (pts deducted), Y = current classic rank (1=best at top)
    const maxH=Math.max(...S.managers.map(m=>m.stats.hits),1)||8;
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
    // Y axis: rank 1 at top, n at bottom
    for(let i=1;i<=n;i++){
      const y=PAD.t+gh*(i-1)/(n-1);
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gw,y);ctx.stroke();
      ctx.fillStyle='rgba(201,168,204,.6)';ctx.font='9px Barlow';ctx.textAlign='right';ctx.fillText(i,PAD.l-3,y+3);
    }
    // X axis
    for(let i=0;i<=4;i++){
      const x=PAD.l+gw*i/4;
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+gh);ctx.stroke();
      ctx.fillStyle='rgba(201,168,204,.5)';ctx.font='8px Barlow';ctx.textAlign='center';
      ctx.fillText(Math.round(maxH*i/4),x,PAD.t + gh + 18
);
    }
    // X axis title
    ctx.fillStyle='rgba(201,168,204,.6)';ctx.font='9px Barlow';ctx.textAlign='center';
    ctx.fillText('Hit Points',PAD.l + gw/2,PAD.t + gh + 38);
    // Y axis title
    ctx.save();ctx.translate(10,PAD.t+gh/2);ctx.rotate(-Math.PI/2);
    ctx.fillStyle='rgba(201,168,204,.6)';ctx.font='9px Barlow';ctx.textAlign='center';
    ctx.fillText('Classic Rank',0,0);ctx.restore();

    // Dots
    S.managers.forEach(m=>{
      const cx=PAD.l+(m.stats.hits/maxH)*gw;
      const cy=PAD.t+gh*(m.rank-1)/(n-1);
      ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fillStyle=m.color+'cc';ctx.fill();
      ctx.strokeStyle=m.color;ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 9px Barlow';ctx.textAlign='center';
      ctx.fillText(m.name,cx,cy-9);
    });
    // Annotation
    ctx.fillStyle='rgba(201,168,204,.6)';
  }

  function renderViz(){
    const canvas=document.getElementById('viz-canvas-c');if(!canvas)return;
    const W=canvas.offsetWidth,H=canvas.offsetHeight;if(!W||!H)return;
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
    if(activeViz===0)drawRankJourney(ctx,W,H);
    else drawScatter(ctx,W,H);
  }
  window._activeVizRender=renderViz;

  el.innerHTML='<div style="display:flex;flex:1;gap:8px;overflow:hidden">'
    +'<div class="pb" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">'
      +'<div class="bl">Season Stats &mdash; click headers to sort</div>'
      +'<div style="font-size:9px;color:var(--light);padding-bottom:4px;flex-shrink:0">Stats through GW'+S.lastFinishedGW+' (last completed GW)</div>'
      +(!hasPos?'<div class="stats-note"><div class="mini-spinner"></div>Positional stats loading&hellip;</div>':'')
      +'<div style="overflow-y:auto;flex:1"><table class="ft" id="stats-tbl"></table></div>'
    +'</div>'
    +'<div class="pb" style="flex:1;display:flex;flex-direction:column;">'
      +'<div class="bl">Season Visualizations</div>'
      +'<div class="viz-tabs">'+VIZ.map((v,i)=>'<button class="viz-tab'+(i===0?' active':'')+'" onclick="switchVizC('+i+',this)">'+v.label+'</button>').join('')+'</div>'
      +'<div style="flex:1;position:relative;min-height:0"><canvas id="viz-canvas-c" style="width:100%;height:100%;display:block;cursor:crosshair"></canvas><div class="chart-tip" id="tip-c"></div></div>'
    +'</div>'
    +'</div>';

  window.switchVizC=function(i,btn){activeViz=i;document.querySelectorAll('.viz-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderViz();};
  buildTable();
  requestAnimationFrame(renderViz);
  // Re-render on resize
  const ro=new ResizeObserver(renderViz);
  const canvasEl=document.getElementById('viz-canvas-c');
  if(canvasEl&&canvasEl.parentElement)ro.observe(canvasEl.parentElement);
  // Attach hover — only active when Rank Journey tab is shown
  /*attachChartHover('viz-canvas-c','tip-c',
    buildClassicRankHistory,
    ()=>({l:28,r:20,t:14,b:30})
  );*/
}

// ── PREMIER FIXTURES ─────────────────────────────────────────
function buildPremierFixtures(){
  const el=document.getElementById('premier-fixtures');if(el.dataset.built)return;el.dataset.built='1';
  const mmap={};S.managers.forEach(m=>mmap[m.entryId]=m);
  const byGW={};S.h2hMatches.forEach(m=>{if(!byGW[m.event])byGW[m.event]=[];byGW[m.event].push(m);});
  let viewGW=S.gw;
  function getFormWithGWs(eid,beforeGW){
    const played=S.h2hMatches.filter(m=>(m.entry_1_entry===eid||m.entry_2_entry===eid)&&m.event<beforeGW&&(m.entry_1_points||m.entry_2_points));
    const last5=played.slice(-5);
    return{results:last5.map(m=>{const mine=m.entry_1_entry===eid?m.entry_1_points:m.entry_2_points,opp=m.entry_1_entry===eid?m.entry_2_points:m.entry_1_points;return mine>opp?'w':mine<opp?'l':'d';}),gws:last5.map(m=>m.event)};
  }
  function render(){
    const fixtures=byGW[viewGW]||[];
    const isCurrent=viewGW===S.gw,isFuture=viewGW>S.gw;
    const maxGW=Math.max(...Object.keys(byGW).map(Number),S.gw);
    // Fixed name width: 110px, form block 90px
    const rows=fixtures.length?fixtures.map(m=>{
      const ha=mmap[m.entry_1_entry]||{name:m.entry_1_player_name||'?',color:'#888',entryId:m.entry_1_entry};
      const hb=mmap[m.entry_2_entry]||{name:m.entry_2_player_name||'?',color:'#888',entryId:m.entry_2_entry};
      const aW=m.entry_1_points>m.entry_2_points,bW=m.entry_2_points>m.entry_1_points;
      const ia=S.managers.findIndex(x=>x.entryId===m.entry_1_entry);
      const ib=S.managers.findIndex(x=>x.entryId===m.entry_2_entry);
      let formAHtml='',formBHtml='';
      if(isCurrent){
        // Home: form left of name, oldest→recent reading left→right, most recent nearest name
        const fa=getFormWithGWs(m.entry_1_entry,viewGW);
        // away: most recent nearest name (left side of away = nearest name)
        const fb=getFormWithGWs(m.entry_2_entry,viewGW);
        const dotsA=fa.results.map((r,j)=>'<div class="fd '+r+'" title="GW'+fa.gws[j]+'">'+r.toUpperCase()+'</div>').join('');
        const gwNumsA=fa.gws.map(g=>'<div class="fix-gw-num">'+g+'</div>').join('');
        formAHtml='<td class="fix-form-cell" style="text-align:right;padding-right:6px"><div class="fix-form-block" style="align-items:flex-end"><div class="fix-gw-nums" style="justify-content:flex-end">'+gwNumsA+'</div><div class="fix-form-dots">'+dotsA+'</div></div></td>';
        // Away form: most recent LEFT (closest to name), oldest right
        const dotsB=fb.results.slice().reverse().map((r,j)=>'<div class="fd '+r+'" title="GW'+fb.gws.slice().reverse()[j]+'">'+r.toUpperCase()+'</div>').join('');
        const gwNumsB=fb.gws.slice().reverse().map(g=>'<div class="fix-gw-num">'+g+'</div>').join('');
        formBHtml='<td class="fix-form-cell" style="padding-left:6px"><div class="fix-form-block"><div class="fix-gw-nums">'+gwNumsB+'</div><div class="fix-form-dots">'+dotsB+'</div></div></td>';
      }else{formAHtml='<td class="fix-form-cell"></td>';formBHtml='<td class="fix-form-cell"></td>';}
      return'<tr>'
        +formAHtml
        +'<td class="fix-name-cell" style="text-align:right;padding-right:6px"><span class="fix-name" style="color:'+(aW?'var(--cyan)':'var(--white)')+'"'+(ia>=0?' onclick="goToProfile('+ia+')"':'')+'>'+ha.name+'</span></td>'
        +'<td class="fix-score-cell"><div class="fix-score">'+(isFuture?'<span style="color:var(--light);font-size:12px">vs</span>':'<span class="'+(aW?'w':'')+'">'+(m.entry_1_points||0)+'</span><span class="sep"> &ndash; </span><span class="'+(bW?'w':'')+'">'+(m.entry_2_points||0)+'</span>')+'</div></td>'
        +'<td class="fix-name-cell" style="text-align:left;padding-left:6px"><span class="fix-name" style="color:'+(bW?'var(--cyan)':'var(--white)')+'"'+(ib>=0?' onclick="goToProfile('+ib+')"':'')+'>'+hb.name+'</span></td>'
        +formBHtml
        +'</tr>';
    }).join(''):'<tr><td colspan="5" style="color:var(--light);font-size:11px;padding:12px">No fixtures for GW'+viewGW+'</td></tr>';
    document.getElementById('fix-body').innerHTML='<table class="fix-table">'+rows+'</table>';
    const lbl=isCurrent?' (Current)':isFuture?' (Upcoming)':' (Result)';
    document.getElementById('fix-gw-lbl').textContent='GW '+viewGW+lbl;
    document.getElementById('fix-prev').disabled=viewGW<=1;
    document.getElementById('fix-next').disabled=viewGW>=maxGW;
  }
  el.innerHTML='<div class="pb" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">'
    +'<div class="bl">H2H Fixtures</div>'
    +'<div class="fix-nav"><button class="fix-nav-btn" id="fix-prev" onclick="fixNav(-1)">&#8592; Prev</button><span class="fix-gw-label" id="fix-gw-lbl"></span><button class="fix-nav-btn" id="fix-next" onclick="fixNav(1)">Next &#8594;</button></div>'
    +'<div style="overflow-y:auto;flex:1" id="fix-body"></div></div>';
  window._vgw=viewGW;window.fixNav=function(d){window._vgw=Math.max(1,Math.min(S.gw+3,window._vgw+d));viewGW=window._vgw;render();};
  render();
}

// ── PREMIER TABLE ────────────────────────────────────────────
function buildPremierTable(){
  const el=document.getElementById('premier-table');if(el.dataset.built)return;el.dataset.built='1';
  const finishedGW = Number(S.lastFinishedGW || S.gw || 0);
  const finM = S.h2hMatches.filter(
  m => Number(m.event) <= finishedGW
);
  const saMap={},ewMap={},byGW={};
  finM.forEach(m=>{
    saMap[m.entry_1_entry]=(saMap[m.entry_1_entry]||0)+(m.entry_2_points||0);
    saMap[m.entry_2_entry]=(saMap[m.entry_2_entry]||0)+(m.entry_1_points||0);
    if(!byGW[m.event])byGW[m.event]=[];byGW[m.event].push(m);
  });
  Object.values(byGW).forEach(gms=>{
    const scores={};gms.forEach(m=>{scores[m.entry_1_entry]=m.entry_1_points||0;scores[m.entry_2_entry]=m.entry_2_points||0;});
    const minS=Math.min(...Object.values(scores));
    const losers=Object.keys(scores).filter(id=>scores[id]===minS).map(Number);
    gms.forEach(m=>{const a=m.entry_1_entry,b=m.entry_2_entry,ap=m.entry_1_points||0,bp=m.entry_2_points||0;if(ap>bp&&losers.includes(b))ewMap[a]=(ewMap[a]||0)+1;if(bp>ap&&losers.includes(a))ewMap[b]=(ewMap[b]||0)+1;});
  });
  const cols=[
    {k:'rank',l:'#',r:false,tip:'Current H2H rank',fn:(s,i)=>'<span class="rk">'+(i+1)+'</span>'},
    {k:'name',l:'Team',r:false,tip:'Manager and team name',fn:s=>{const m=S.managers.find(x=>x.entryId===s.entry)||{};return'<div style="display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:'+(m.color||'#888')+';display:inline-block"></span><div><div class="mn">'+(m.name||s.player_name)+'</div><div class="tn">'+(m.team||s.entry_name)+'</div></div></div>';}},
    {k:'W',l:'W',r:true,tip:'Wins',fn:s=>'<span style="color:var(--cyan);font-weight:600">'+(s.matches_won||0)+'</span>'},
    {k:'D',l:'D',r:true,tip:'Draws',fn:s=>'<span style="color:rgba(200,200,200,.8)">'+(s.matches_drawn||0)+'</span>'},
    {k:'L',l:'L',r:true,tip:'Losses',fn:s=>'<span style="color:var(--pink)">'+(s.matches_lost||0)+'</span>'},
    {k:'total',l:'Pts',r:true,tip:'H2H league pts (3 per win, 1 per draw)',fn:s=>'<span class="tp">'+(s.total||0)+'</span>'},
    {k:'SF',l:'SF',r:true,tip:'Score For \u2014 sum of your GW scores',fn:s=>s.points_for||0},

  // H2H rank journey builder
  function buildH2HRankHistory(){
    const cutoffH=S.lastFinishedGW||S.gw;
    const gwKeys=Object.keys(byGW).map(Number).filter(g=>g<=cutoffH).sort((a,b)=>a-b);
    const result={};S.managers.forEach(m=>{result[m.entryId]=[];});
    const cumLeaguePts={};S.managers.forEach(m=>{cumLeaguePts[m.entryId]=0;});
    gwKeys.forEach(gw=>{
      (byGW[gw]||[]).forEach(m=>{
        const a=m.entry_1_entry,b=m.entry_2_entry;
        const ap=m.entry_1_points||0,bp=m.entry_2_points||0;
        if(ap>bp){cumLeaguePts[a]=(cumLeaguePts[a]||0)+3;}
        else if(bp>ap){cumLeaguePts[b]=(cumLeaguePts[b]||0)+3;}
        else{cumLeaguePts[a]=(cumLeaguePts[a]||0)+1;cumLeaguePts[b]=(cumLeaguePts[b]||0)+1;}
      });
      const ranked=S.managers.map(m=>({eid:m.entryId,pts:cumLeaguePts[m.entryId]||0}));
      ranked.sort((a,b)=>b.pts-a.pts);
      ranked.forEach((x,i)=>{if(result[x.eid])result[x.eid].push({gw,rank:i+1});});
    });
    return result;
  }

  let activeViz=0;
  function drawH2HRankJourney(ctx,W,H){
    const PAD={l:28,r:70,t:14,b:22};
    const gw=W-PAD.l-PAD.r,gh=H-PAD.t-PAD.b;
    const n=S.managers.length;
    const hist=buildH2HRankHistory();
    const maxGW=Math.max(...Object.values(hist).flatMap(arr=>arr.map(d=>d.gw)),1);
    // Grid
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
    for(let i=1;i<=n;i++){
      const y=PAD.t+gh*(i-1)/(n-1);
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gw,y);ctx.stroke();
      ctx.fillStyle='rgba(201,168,204,.6)';ctx.font='9px Barlow';ctx.textAlign='right';
      ctx.fillText(i,PAD.l-3,y+3);
    }
    const step=Math.max(1,Math.round(maxGW/8));
    for(let g=1;g<=maxGW;g+=step){
      const x=PAD.l+gw*(g-1)/(maxGW-1||1);
      ctx.fillStyle='rgba(201,168,204,.5)';ctx.font='8px Barlow';ctx.textAlign='center';
      ctx.fillText(g,x,H-2);
    }
    // Lines
    S.managers.forEach(m=>{
      const data=hist[m.entryId]||[];if(!data.length)return;
      ctx.beginPath();ctx.strokeStyle=m.color+'cc';ctx.lineWidth=1.5;
      data.forEach((d,i)=>{
        const x=PAD.l+gw*(d.gw-1)/(maxGW-1||1);
        const y=PAD.t+gh*(d.rank-1)/(n-1);
        if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
    // Dots
    S.managers.forEach(m=>{
      const data=hist[m.entryId]||[];if(!data.length)return;
      data.forEach(d=>{
        const x=PAD.l+gw*(d.gw-1)/(maxGW-1||1);
        const y=PAD.t+gh*(d.rank-1)/(n-1);
        ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle=m.color+'aa';ctx.fill();
      });
      const last=data[data.length-1];
      const lx=PAD.l+gw*(last.gw-1)/(maxGW-1||1);
      const ly=PAD.t+gh*(last.rank-1)/(n-1);
      ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle=m.color;ctx.fill();
    });
    // Labels right — sorted and nudged
    const labelData=S.managers.map(m=>{
      const data=hist[m.entryId]||[];
      const last=data[data.length-1];
      if(!last)return null;
      return{name:m.name,color:m.color,rank:last.rank,y:PAD.t+gh*(last.rank-1)/(n-1)};
    }).filter(Boolean).sort((a,b)=>a.rank-b.rank);
    for(let i=1;i<labelData.length;i++){
      if(labelData[i].y-labelData[i-1].y<10) labelData[i].y=labelData[i-1].y+10;
    }
    labelData.forEach(d=>{
      ctx.fillStyle=d.color;
      ctx.font='bold 9px Barlow Condensed, Barlow, sans-serif';
      ctx.textAlign='left';
      ctx.fillText(d.name,PAD.l+gw+6,d.y+3);
    });
    ctx.fillStyle='rgba(201,168,204,.5)';ctx.font='8px Barlow';ctx.textAlign='center';
    ctx.fillText('Gameweek',PAD.l+gw/2,H-2);
  }

  function attachChartHover(canvasId, tipId, getHistFn, getPAD){
    const canvas=document.getElementById(canvasId);

    if(!canvas||!tip)return;
    canvas.addEventListener('mousemove',function(e){
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const W=canvas.width,H=canvas.height;
      const PAD=getPAD();
      const gw=W-PAD.l-PAD.r,gh=H-PAD.t-PAD.b;
      const n=S.managers.length;

      const allGWs2=new Set();
      S.managers.forEach(m=>(hist[m.entryId]||[]).forEach(d=>allGWs2.add(d.gw)));
      const maxGW=[...allGWs2].sort((a,b)=>a-b).pop()||S.gw||1;
      let best=null,bestDist=12;
      S.managers.forEach(m=>{
        (hist[m.entryId]||[]).forEach(d=>{
          const x=PAD.l+gw*(d.gw-1)/(maxGW-1||1);
          const y=PAD.t+gh*(d.rank-1)/(n-1||1);
          const dist=Math.sqrt((mx-x)**2+(my-y)**2);
          if(dist<bestDist){bestDist=dist;best={m,d,x,y};}
        });
      });
      if(best){
        tip.style.display='block';
        tip.innerHTML='<strong style="color:'+best.m.color+'">'+best.m.name+'</strong><br>GW '+best.d.gw+' &nbsp;&bull;&nbsp; Rank #'+best.d.rank;

      }else{

      }
    });

function drawScoresScatter(ctx, W, H) {
  const PAD={l:58,r:72,t:20,b:58};

  const gw = W - PAD.l - PAD.r;
  const gh = H - PAD.t - PAD.b;

  const finM2 = S.h2hMatches.filter(
    m => m.event <= (S.lastFinishedGW || S.gw)
  );

  const sfMap = {};
  const saMap2 = {};

  S.managers.forEach(m => {
    sfMap[m.entryId] = 0;
    saMap2[m.entryId] = 0;
  });

  finM2.forEach(m => {
    sfMap[m.entry_1_entry] =
      (sfMap[m.entry_1_entry] || 0) + (m.entry_1_points || 0);

    sfMap[m.entry_2_entry] =
      (sfMap[m.entry_2_entry] || 0) + (m.entry_2_points || 0);

    saMap2[m.entry_1_entry] =
      (saMap2[m.entry_1_entry] || 0) + (m.entry_2_points || 0);

    saMap2[m.entry_2_entry] =
      (saMap2[m.entry_2_entry] || 0) + (m.entry_1_points || 0);
  });

  const allSF = S.managers.map(m => sfMap[m.entryId] || 0);
  const allSA = S.managers.map(m => saMap2[m.entryId] || 0);

  const minSF = 1700;
  const maxSF = 2350;

  const minSA = 1700;
  const maxSA = 2350;

  const sfRange = maxSF - minSF || 1;
  const saRange = maxSA - minSA || 1;

  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.lineWidth = 1;

  // Horizontal lines
  for(let i = 0; i <= 4; i++) {
    const y = PAD.t + gh * (1 - i / 4);

    ctx.beginPath();
    ctx.moveTo(PAD.l, y);
    ctx.lineTo(PAD.l + gw, y);
    ctx.stroke();

    ctx.fillStyle = 'rgba(201,168,204,.55)';
    ctx.font = '8px Barlow';
    ctx.textAlign = 'right';

    ctx.fillText(
      Math.round(minSF + sfRange * i / 4),
      PAD.l - 3,
      y + 3
    );
  }

  // Vertical lines
  for(let i = 0; i <= 4; i++) {
    const x = PAD.l + gw * i / 4;

    ctx.beginPath();
    ctx.moveTo(x, PAD.t);
    ctx.lineTo(x, PAD.t + gh);
    ctx.stroke();

    ctx.fillStyle = 'rgba(201,168,204,.55)';
    ctx.font = '8px Barlow';
    ctx.textAlign = 'center';

    ctx.fillText(Math.round(minSF + sfRange * i / 4),x,PAD.t + gh + 18);
  }

  // Axis labels
  ctx.fillStyle = 'rgba(201,168,204,.7)';
  ctx.font = '9px Barlow';
  ctx.textAlign = 'center';

  ctx.fillText('Scores', PAD.l + gw/2, H - 8);

  ctx.save();
  ctx.translate(12, PAD.t + gh / 2);
  ctx.rotate(-Math.PI / 2);

  ctx.fillStyle = 'rgba(201,168,204,.7)';
  ctx.font = '9px Barlow';
  ctx.textAlign = 'center';

  ctx.fillText('Scores Against', 0, 0);

  ctx.restore();

  // Manager points
  S.managers.forEach(m => {
  const sf=sfMap[m.entryId]||0,sa=saMap2[m.entryId]||0;

  const cx=PAD.l+gw*((sf-minSF)/sfRange);
  const cy=PAD.t+gh*(1-(sa-minSA)/saRange);

    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);

    ctx.fillStyle = m.color + 'cc';
    ctx.fill();

    ctx.strokeStyle = m.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = m.color;
    ctx.font = 'bold 9px Barlow Condensed,Barlow,sans-serif';
    ctx.textAlign = 'left';

    ctx.fillText(m.name, cx + 8, cy + 3);
  });
}

function buildPremierMatrix(){
  const el=document.getElementById('premier-matrix');if(el.dataset.built)return;el.dataset.built='1';
  const mgrs=S.managers,rec={};
  mgrs.forEach(a=>{rec[a.entryId]={};mgrs.forEach(b=>{if(a.entryId!==b.entryId)rec[a.entryId][b.entryId]={w:0,d:0,l:0};});});
  const finishedGW = Number(S.lastFinishedGW || S.gw || 0);
  S.h2hMatches
  .filter(m => Number(m.event) <= finishedGW)
  .forEach(m=>{
    const ea=m.entry_1_entry,eb=m.entry_2_entry;if(!rec[ea] || !rec[eb] || !rec[ea][eb]) return;;
    const ap=m.entry_1_points||0,bp=m.entry_2_points||0;
    if(ap>bp){rec[ea][eb].w++;rec[eb][ea].l++;}else if(bp>ap){rec[ea][eb].l++;rec[eb][ea].w++;}else{rec[ea][eb].d++;rec[eb][ea].d++;}
  });

function buildSquad(picks){

  const all=picks.picks;const starters=all.filter(p=>p.position<=11);const bench=all.filter(p=>p.position>11).sort((a,b)=>a.position-b.position);
  const gks=starters.filter(p=>S.elem[p.element]?.pos===1);

  const mids=starters.filter(p=>S.elem[p.element]?.pos===3);

  function pCard(p){
    const el=S.elem[p.element]||{};const lp=S.livePoints[p.element];
    const tc=el.tc||1;const isGK=el.pos===1;
    const played=lp&&lp.mins>0;const pts=lp?lp.pts*(p.multiplier||1):0;
    const cap=p.is_captain,vc=p.is_vice_captain;
    const shortName=(el.name||'?').split(' ').pop().slice(0,8);
    const ntCls=cap?'name-tag cap-tag':vc?'name-tag vc-tag':'name-tag';
    return'<div class="p-card"><div class="shirt-wrap"><img class="shirt-img" src="'+shirtUrl(tc,isGK)+'" onerror="this.style.opacity=.2" alt=""/>'+(lp!=null?'<div class="pts-badge '+(played?'played':'pending')+'">'+pts+'</div>':'')+'</div><div class="'+ntCls+'">'+(cap?'(C) ':vc?'(V) ':'')+shortName+'</div></div>';
  }
  const rowDefs=[{players:gks,top:'10%'},{players:defs,top:'30%'},{players:mids,top:'52%'},{players:fwds,top:'72%'}];
  const pitchRows=rowDefs.map(r=>r.players.length?'<div class="pitch-row" style="top:'+r.top+';transform:translateY(-50%)">'+r.players.map(p=>pCard(p)).join('')+'</div>':'').join('');
  return'<div class="pitch"><svg class="pitch-lines" viewBox="0 0 100 160" preserveAspectRatio="none"><rect x="5" y="5" width="90" height="150" rx="2" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="0.5"/><line x1="5" y1="80" x2="95" y2="80" stroke="rgba(255,255,255,.1)" stroke-width="0.5"/><ellipse cx="50" cy="80" rx="12" ry="8" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/><rect x="28" y="5" width="44" height="18" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="0.5"/><rect x="28" y="137" width="44" height="18" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="0.5"/></svg>'+pitchRows+'<div class="bench-strip">'+bench.map(p=>pCard(p)).join('')+'</div></div>';
}

// ── PROFILE ──────────────────────────────────────────────────
function openProfile(idx){
  const m=S.managers[idx];
  document.getElementById('teams-land').style.display='none';
  const pw=document.getElementById('prof-wrap');pw.innerHTML='';pw.classList.add('active');
  const h2hE=S.h2hStandings.find(s=>s.entry===m.entryId);
  const pmR=h2hE?S.h2hStandings.indexOf(h2hE)+1:'&mdash;';
  const allH2H=S.h2hMatches.filter(x=>x.entry_1_entry===m.entryId||x.entry_2_entry===m.entryId);
  const h2hW=allH2H.filter(x=>{const mine=x.entry_1_entry===m.entryId?x.entry_1_points:x.entry_2_points,opp=x.entry_1_entry===m.entryId?x.entry_2_points:x.entry_1_points;return mine>opp;}).length;
  const h2hD=allH2H.filter(x=>x.entry_1_points===x.entry_2_points).length;
  const h2hL=allH2H.length-h2hW-h2hD;
  const ps=S.posStats?.[m.entryId]||{};
  const radarData=Object.keys(ps).length?{GK:ps.GK,DEF:ps.DEF,MID:ps.MID,FWD:ps.FWD,Cap:ps.Cap}:{GK:Math.round(m.pts*.08),DEF:Math.round(m.pts*.22),MID:Math.round(m.pts*.30),FWD:Math.round(m.pts*.25),Cap:Math.round(m.pts*.15)};
  const totalForRadar=Object.values(radarData).reduce((s,v)=>s+v,0)||1;
  const gwH=m.gwHistory;const maxH=Math.max(...gwH.map(g=>g.points),1);
  const spark=gwH.map(g=>'<div class="spark-bar" data-v="GW'+g.event+': '+g.points+' pts" style="height:'+Math.max(4,Math.round((g.points/maxH)*100))+'%;background:'+(g.points>=(S.gwAvg||55)?'rgba(0,255,133,.55)':'rgba(233,0,82,.45)')+'"></div>').join('');
  const chipsHtml=m.chipsHistory&&m.chipsHistory.length
    ?m.chipsHistory.map(c=>'<div class="sr"><span class="sl">'+c.abbr+' (GW'+c.gw+')</span><span class="sv">'+c.pts+' pts</span></div>').join('')
    :'<div class="sr"><span class="sl" style="font-style:italic">No chips used yet</span></div>';
  const rivHtml=m.rivalries.length?m.rivalries.map(r=>'<div class="rivalry-item"><div class="rivalry-name">'+r.name+'</div></div>').join(''):'<div style="color:var(--light);font-size:11px">None set</div>';
  const trphHtml=m.trophies.length?m.trophies.map(t=>'<div class="trophy-item">\u2605 '+t+'</div>').join(''):'<div style="color:var(--light);font-size:11px;padding:2px 0">Coming soon</div>';
  const honHtml=m.honors.length?m.honors.map(h=>'<div class="trophy-item">'+h+'</div>').join(''):'<div style="color:var(--light);font-size:11px;padding:2px 0">Coming soon</div>';

  pw.innerHTML='<div class="profile-subnav"><button class="back-btn" onclick="closeProfile()">\u2190 All Teams</button><div class="snav-div"></div><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:'+m.color+';letter-spacing:1px">'+m.name+'</span><span style="font-size:11px;color:var(--light);margin-left:6px">'+m.team+'</span></div>'
    +'<div class="profile-content">'
    // LEFT (Adjusted flex ratios per your prompt)
    +'<div class="prof-col" style="flex:1">'
      +'<div class="pb" style="flex:0 0 auto;min-height:130px"><div style="display:flex;gap:12px;align-items:flex-start"><div class="prof-photo" style="color:'+m.color+'"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="prof-sil"><circle cx="50" cy="32" r="20" fill="currentColor"/><path d="M15 90 C15 65 35 55 50 55 C65 55 85 65 85 90Z" fill="currentColor"/></svg></div><div><div class="prof-name" style="color:'+m.color+'">'+m.name+'</div><div style="font-size:11px;color:var(--light)">'+m.team+'</div>'+(m.akaNames.length?'<div style="font-size:10px;color:var(--light);font-style:italic;margin-top:1px">AKA: '+m.akaNames.join(', ')+'</div>':'')+'<div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap"><span class="rank-tag">#'+m.rank+' Classic</span><span class="rank-tag">#'+pmR+' Premier</span><span class="rank-tag">'+m.pts+' pts</span></div></div></div></div>'
      +'<div class="pb" style="flex:1.4"><div class="bl">Season Snapshot</div>'
        +'<div class="sr"><span class="sl">Best GW</span><span class="sv c">'+m.stats.bestGW+'</span></div>'
        +'<div class="sr"><span class="sl">Worst GW</span><span class="sv p">'+m.stats.worstGW+'</span></div>'
        +'<div class="sr"><span class="sl">Avg GW <span style="font-size:9px;color:var(--light);font-style:italic">(personal)</span></span><span class="sv">'+(()=>{const h=m.gwHistory.filter(g=>g.event<=(S.lastFinishedGW||S.gw));return h.length?Math.round(h.reduce((s,g)=>s+g.points,0)/h.length):m.stats.avgGW;})()+'</span></div>'
        +'<div class="sr"><span class="sl">Hits</span><span class="sv p">'+(m.stats.hits>0?'&minus;'+m.stats.hits:'0')+'</span></div>'
        +'<div class="sr"><span class="sl">Bench Pts</span><span class="sv">'+m.stats.benchPts+'</span></div>'
        +'<div class="sr"><span class="sl">H2H Record</span><span class="sv">'+h2hW+'W '+h2hD+'D '+h2hL+'L</span></div>'
        +'<div style="margin-top:6px"><div style="font-size:9px;color:var(--light);margin-bottom:3px">All GWs (red = below avg)</div><div class="spark-wrap">'+spark+'</div></div>'
      +'</div>'
      +'<div class="pb" style="flex:1.2"><div class="bl">Season Awards</div>'
        +'<div class="award-row"><span class="award-name">King of GW</span><span class="award-count" style="color:var(--cyan)">'+m.awards.kingOfGW+'x</span></div>'
        +'<div class="award-row"><span class="award-name">Clown of GW</span><span class="award-count" style="color:var(--pink)">'+m.awards.clownOfGW+'x</span></div>'
        +'<div class="award-row"><span class="award-name">Golden Bench</span><span class="award-count" style="color:var(--gold)">'+m.awards.goldenBench+'x</span></div>'
      +'</div>'
    +'</div>'
    // MID — SQUAD
    +'<div class="prof-col" style="flex:1.15"><div class="pb" style="flex:1;overflow:hidden"><div class="bl">Squad &mdash; GW'+S.gw+'</div><div class="pitch-wrap">'+buildSquad(m.picks)+'</div></div></div>'
    // RIGHT
    +'<div class="prof-col" style="flex:0.85">'
      +'<div class="pb" style="flex:0 0 auto"><div class="bl">Points Radar</div><div id="radar-'+idx+'" style="display:flex;align-items:center;justify-content:center;padding:2px"></div></div>'
      +'<div class="pb" style="flex:0 0 auto"><div class="bl">Rivalries</div>'+rivHtml+'</div>'
      +'<div class="pb" style="flex:1"><div class="bl">Trophies</div>'+trphHtml+'</div>'
      +'<div class="pb" style="flex:1"><div class="bl">Honors</div>'+honHtml+'</div>'
    +'</div>'
    +'</div>';
  requestAnimationFrame(()=>drawRadar('radar-'+idx,radarData,m.color,totalForRadar));
}
function closeProfile(){document.getElementById('prof-wrap').classList.remove('active');document.getElementById('prof-wrap').innerHTML='';document.getElementById('teams-land').style.display='';}

// ── RADAR ────────────────────────────────────────────────────
function drawRadar(id,data,color,total){
  const el=document.getElementById(id);if(!el)return;
  const W=155,H=155,cx=W/2,cy=H/2,r=52;
  const labels=Object.keys(data),vals=Object.values(data),maxV=Math.max(...vals,1),n=labels.length;
  const ang=labels.map((_,i)=>(Math.PI*2/n)*i-Math.PI/2);
  const rings=[.25,.5,.75,1].map(lv=>'<polygon points="'+ang.map(a=>[(cx+r*lv*Math.cos(a)).toFixed(1),(cy+r*lv*Math.sin(a)).toFixed(1)].join(',')).join(' ')+'" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>').join('');
  const axes=ang.map(a=>'<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>').join('');
  const pts=vals.map((v,i)=>{const p=Math.min(v/maxV,1);return[(cx+r*p*Math.cos(ang[i])).toFixed(1),(cy+r*p*Math.sin(ang[i])).toFixed(1)].join(',');}).join(' ');
  const dots=vals.map((v,i)=>{const p=Math.min(v/maxV,1);const px=(cx+r*p*Math.cos(ang[i])).toFixed(1),py=(cy+r*p*Math.sin(ang[i])).toFixed(1);const pct=Math.round(v/(total||1)*100);return'<circle cx="'+px+'" cy="'+py+'" r="4" fill="'+color+'" stroke="var(--dark)" stroke-width="1.5"><title>'+labels[i]+': '+v+' pts ('+pct+'%)</title></circle>';}).join('');
  const lbls=labels.map((l,i)=>'<text x="'+(cx+(r+13)*Math.cos(ang[i])).toFixed(1)+'" y="'+(cy+(r+13)*Math.sin(ang[i])).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.65)" font-family="Barlow Condensed" font-size="10" font-weight="600">'+l+'</text>').join('');
  el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="max-width:'+W+'px">'+rings+axes+'<polygon points="'+pts+'" fill="'+color+'25" stroke="'+color+'" stroke-width="1.5"/>'+dots+lbls+'</svg>';
}
loadAll();
</script>
